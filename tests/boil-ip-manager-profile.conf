[General]
loglevel = notify

[Script]
boil-ip-query = type=generic,script-path=../boil-ip-manager.js,timeout=20,argument="action=query&api_token=test-token&enabled=true&notify=false"
boil-ip-change = type=generic,script-path=../boil-ip-manager.js,timeout=20,argument="action=change&api_token=test-token&enabled=false&notify=false"

[Panel]
Boil IP 查询 = script-name=boil-ip-query,title=Boil IP 查询,content=点击刷新按钮查询当前 IP
Boil IP 更换 = script-name=boil-ip-change,title=Boil IP 更换,content=安全锁默认关闭

[Rule]
FINAL,DIRECT
